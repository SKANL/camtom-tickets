name: Emergency reconcile

# Manual break-glass operation only. Supabase pg_cron is the sole scheduler.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RECONCILE to run the incremental endpoint once'
        required: true
        type: string

# The workflow only performs an outbound request and never reads repository data.
permissions: {}

jobs:
  reconcile:
    if: ${{ inputs.confirm == 'RECONCILE' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ping reconcile endpoint
        run: |
          curl -fsS -X GET "${{ secrets.RECONCILE_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
